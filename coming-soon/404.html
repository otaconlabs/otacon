<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#040505" />
    <meta name="robots" content="noindex" />
    <title>404 — command not found · Otacon</title>

    <!-- Absolute /otacon/ paths: a 404 is served from arbitrary URLs, so relative paths would break. -->
    <link rel="icon" type="image/png" href="/otacon/assets/img/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
      /* ---- Tokens (from site3/src/styles/tokens.css) ---- */
      :root {
        --bg: #040505;
        --panel: #080b08;
        --border-dim: #1d2620;
        --accent-strong: #55e07f;
        --accent-deep: #2f8f57;
        --grid-line: rgba(85, 224, 127, 0.045);
        --glow: rgba(85, 224, 127, 0.18);
        --text: #eafff0;
        --muted: #9fb0a6;
        --error: #f06457;
        --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        --font-body: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
        --radius: 3px;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100dvh;
        display: grid; place-items: center;
        background: var(--bg); color: var(--text);
        font-family: var(--font-body); line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      a { color: inherit; text-decoration: none; }
      h1, .mono { font-family: var(--font-mono); }
      p { margin: 0 0 1rem; color: var(--muted); }

      .prompt { color: var(--accent-strong); font-family: var(--font-mono); }
      .cursor::after {
        content: ""; display: inline-block; width: 0.55ch; height: 1em;
        margin-left: 0.15em; background: var(--accent-strong);
        vertical-align: -0.12em; animation: blink 1s steps(1) infinite;
      }
      @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }

      .grid-bg { position: relative; isolation: isolate; }
      .grid-bg::before {
        content: ""; position: absolute; inset: 0; z-index: -1;
        background:
          repeating-linear-gradient(0deg, transparent 0 21px, var(--grid-line) 21px 22px),
          repeating-linear-gradient(90deg, transparent 0 21px, var(--grid-line) 21px 22px);
        -webkit-mask-image: radial-gradient(120% 90% at 50% 0%, #000 0%, transparent 75%);
        mask-image: radial-gradient(120% 90% at 50% 0%, #000 0%, transparent 75%);
        pointer-events: none;
      }
      :focus-visible { outline: 2px solid var(--accent-strong); outline-offset: 2px; border-radius: var(--radius); }

      .nf { width: 100%; display: grid; justify-items: center; text-align: center; gap: 0.6rem; padding: 4rem 16px; }
      .mascot { display: inline-grid; width: 180px; }
      .mascot img { width: 100%; height: auto; display: block; filter: drop-shadow(0 0 22px var(--glow)); }
      .nf .prompt { margin: 0.4rem 0 0; font-size: 0.9rem; }
      .nf h1 { font-size: clamp(1.8rem, 5vw, 3rem); color: var(--error); margin: 0.1rem 0 0.3rem; line-height: 1.05; }
      .lead { max-width: 460px; }
      .btn {
        display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 0.6rem;
        padding: 0.7rem 1.1rem; border: 1px solid var(--accent-deep);
        border-radius: var(--radius); font-size: 0.95rem; color: var(--accent-strong);
        transition: background 140ms ease, border-color 140ms ease;
      }
      .btn:hover { background: color-mix(in srgb, var(--accent-strong) 14%, transparent); border-color: var(--accent-strong); }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
        .cursor::after { opacity: 1; }
      }
    </style>
  </head>

  <body>
    <main class="nf grid-bg">
      <span class="mascot">
        <img src="/otacon/assets/img/otacon-sad.png" width="180" height="180" alt="Otacon looking sad" />
      </span>
      <p class="prompt mono">otacon@discord ~ % 404</p>
      <h1 class="mono">command not found</h1>
      <p class="lead">That page doesn't exist yet — the site's still compiling.</p>
      <a class="btn mono" href="/otacon/">,home<span class="cursor"></span></a>
    </main>
  </body>
</html>
